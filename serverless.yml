service: image-enhance-api

useDotenv: true

provider:
  name: aws
  runtime: python3.11
  region: ap-south-1

  memorySize: 1024
  timeout: 90

  environment:
    CLOUDINARY_CLOUD_NAME: ${env:CLOUDINARY_CLOUD_NAME}
    CLOUDINARY_API_KEY: ${env:CLOUDINARY_API_KEY}
    CLOUDINARY_API_SECRET: ${env:CLOUDINARY_API_SECRET}

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
          Resource: "arn:aws:logs:*:*:*"

plugins:
  - serverless-python-requirements
  - serverless-dotenv-plugin

custom:
  pythonRequirements:
    dockerizePip: false
    slim: true
    strip: false

functions:

  enhance:
    handler: lambda_function.lambda_handler

    events:
      - http:
          path: enhance
          method: post
          cors: true

      - http:
          path: enhance
          method: options
          cors: true

  health:
    handler: lambda_function.lambda_handler

    events:
      - http:
          path: health
          method: get
          cors: true